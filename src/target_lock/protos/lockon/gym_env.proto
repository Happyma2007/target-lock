syntax = "proto3";

package gym_v2;

import "google/protobuf/struct.proto";

service GymEnv {
  // 单一的双向流，客户端发命令，服务端回结果。
  rpc StreamEnv(stream EnvRequest) returns (stream EnvReply);
}

// ===== 通用张量结构 =====
message Tensor {
  bytes data = 1;           // numpy.tobytes() 序列化后的原始字节
  repeated int64 shape = 2; // 张量维度，例如 [84, 84, 3]
  string dtype = 3;         // 数据类型，如 "float32", "uint8", "int64"
}

message TensorList {
  repeated Tensor items = 1;
}

message TensorDict {
  map<string, Tensor> fields = 1;
}

message TensorValue {
  oneof kind {
    Tensor tensor = 1;
    TensorList list = 2;
    TensorDict dict = 3;
  }
}

// ===== 客户端请求 =====
message EnvRequest {
  oneof cmd {
    Reset reset = 1;
    Step step = 2;
    Close close = 3;
  }
}

// ===== 服务端回复 =====
message EnvReply {
  oneof result {
    ResetReply reset = 1;
    StepReply step = 2;
    CloseReply close = 3;
  }
}

// ===== Reset =====
message Reset {
  repeated int64 seed = 1;
  repeated google.protobuf.Struct options = 2;
}

message ResetReply {
  TensorValue observation = 1;
  google.protobuf.Struct info = 2;
}

// ===== Step =====
message Step {
  TensorValue action = 1;
}

message StepReply {
  TensorValue observation = 1;
  repeated float reward = 2;
  repeated bool terminated = 3;
  repeated bool truncated = 4;
  google.protobuf.Struct info = 5;
}

// ===== Close =====
message Close {}
message CloseReply {}
