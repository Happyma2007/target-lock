syntax = "proto3";

package vision.v1;

import "google/protobuf/struct.proto";

message BoundingBox {
  float x_min = 1;
  float y_min = 2;
  float x_max = 3;
  float y_max = 4;
}

message Point2D {
  float x = 1;
  float y = 2;
}

message Circle {
  Point2D center = 1;
  float radius = 2;
}

message DetectionGeometry {
  oneof shape {
    BoundingBox box = 1;
    Point2D point = 2;
    Circle circle = 3;
    google.protobuf.Struct custom = 4;
  }
}

message Detection {
  string class_name = 1;
  int32 class_id = 2;
  float score = 3;
  DetectionGeometry geometry = 4;
  DetectionGeometry normalized_geometry = 5;
}

message StreamConfig {
  string stream_id = 1;
  string video_codec = 2; // 例如 "h264"
  uint32 width = 3;
  uint32 height = 4;
  float score_threshold = 5;
  uint32 max_detections = 6;
}
